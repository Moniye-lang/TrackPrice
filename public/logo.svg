<svg width="240" height="80" viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="pin-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500" />
      <stop offset="100%" style="stop-color:#FF5E00" />
    </linearGradient>
    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3" />
      <stop offset="100%" style="stop-color:#1976D2" />
    </linearGradient>
  </defs>

  <!-- Pin/Marker Background Shape -->
  <path d="M40 70C40 70 65 45 65 30C65 16.1929 53.8071 5 40 5C26.1929 5 15 16.1929 15 30C15 45 40 70 40 70Z" fill="url(#pin-gradient)" />
  
  <!-- Outer glowing ring around the pin (subtle highlight) -->
  <circle cx="40" cy="30" r="18" fill="white" fill-opacity="0.1" />

  <!-- Down Arrow (Orange/Reddish shading) -->
  <path d="M30 22V32H24L32 42L40 32H34V22H30Z" fill="white" />
  
  <!-- Up Arrow (Blue) -->
  <path d="M46 38V28H52L44 18L36 28H42V38H46Z" fill="#1565C0" />
  
  <!-- "Track" Text -->
  <text x="75" y="52" fill="#1E293B" font-family="Arial, sans-serif" font-weight="900" font-size="32" letter-spacing="-1">Track</text>
  
  <!-- "Pricely" Text -->
  <text x="160" y="52" fill="#FF7A00" font-family="Arial, sans-serif" font-weight="900" font-size="32" letter-spacing="-1">Pricely</text>
</svg>
